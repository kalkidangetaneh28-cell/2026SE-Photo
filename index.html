<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🎓 class memory book · student gift</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f4fa, #e1eaf8, #dae5f0, #f0f0fa, #f5f0fa);
            background-size: 400% 400%;
            animation: studentGradient 16s ease infinite;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            margin: 0;
            padding: 16px;
        }

        @keyframes studentGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stars-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .star {
            position: absolute;
            bottom: -50px;
            color: rgba(255, 215, 140, 0.5);
            font-size: 24px;
            animation: floatStar 10s linear infinite;
        }

        @keyframes floatStar {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        .wedding-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 50px 20px 50px 20px;
            box-shadow: 0 30px 50px rgba(120, 140, 180, 0.3), 0 10px 20px rgba(200, 210, 240, 0.5);
            padding: 2.5rem 2rem;
            max-width: 800px;
            width: 100%;
            text-align: center;
            z-index: 20;
            border: 3px solid rgba(240, 245, 255, 0.9);
            animation: gentleFloat 1.2s ease-out;
            margin: 20px 0;
        }

        @keyframes gentleFloat {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #2c4b7a;
            text-shadow: 3px 3px 0 #dfe9ff, 5px 5px 0 rgba(170, 200, 240, 0.5);
            margin-bottom: 0.3rem;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 1.3rem;
            font-weight: 300;
            color: #3a5f8b;
            background: rgba(235, 245, 255, 0.7);
            display: inline-block;
            padding: 0.4rem 1.5rem;
            border-radius: 40px;
            margin: 1rem 0 1.8rem;
            border: 1px solid #b0c8f0;
        }

        .gift-wrapper {
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-block;
            padding: 15px 35px;
            border-radius: 120px;
            background: rgba(255, 250, 240, 0.6);
            margin: 15px 0 15px;
            -webkit-tap-highlight-color: transparent;
            border: 2px dashed #e8b4b4;
        }

        .gift-wrapper:hover {
            transform: scale(1.1);
        }

        .gift-wrapper:active {
            transform: scale(0.95);
        }

        .gift-icon {
            font-size: 10rem;
            line-height: 1;
            color: #d4a5a5;
            filter: drop-shadow(0 15px 10px #fcc2c2);
            animation: gentleWobble 4s infinite;
        }

        @keyframes gentleWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .click-hint {
            font-size: 1.2rem;
            color: #9b6b7c;
            background: #fff0ed;
            padding: 0.4rem 1.4rem;
            border-radius: 40px;
            display: inline-block;
            margin: 10px 0 0;
            font-weight: 500;
            border: 1px dotted #dba1a1;
        }

        .surprise-content {
            margin-top: 2rem;
            padding: 1.8rem 1.8rem 2.5rem;
            background: rgba(255, 250, 245, 0.9);
            backdrop-filter: blur(4px);
            border-radius: 70px 20px 70px 20px;
            border: 4px solid white;
            box-shadow: inset 0 0 30px #fff0f0, 0 20px 30px rgba(0,0,0,0.1);
        }

        .surprise-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #2a4d7a;
            margin-bottom: 1rem;
            text-shadow: 1px 1px 0 #dae6ff;
        }

        /* photo gallery grid */
        .photo-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 2rem 0;
        }

        .gallery-item {
            width: 150px;
            height: 150px;
            border-radius: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            background: #faf8f3;
        }

        .gallery-item:hover {
            transform: scale(1.05);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .wedding-message {
            font-size: 1.5rem;
            font-weight: 400;
            color: #1d3b5a;
            margin: 1.5rem 0 1rem;
            line-height: 1.5;
            font-family: 'Playfair Display', serif;
        }

        .signature {
            font-size: 1.3rem;
            color: #2f557a;
            background: #e2edff;
            display: inline-block;
            padding: 0.4rem 2rem;
            border-radius: 40px;
            font-style: italic;
            margin: 0.5rem 0;
        }

        .hidden {
            display: none;
        }

        .fade-in {
            animation: fadeInUp 0.8s forwards;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Lightbox modal */
        .lightbox-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .lightbox-modal.active {
            display: flex;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2.5rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .lightbox-close:hover {
            transform: scale(1.1);
            color: #fbc1c1;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .subtitle { font-size: 1.1rem; }
            .gift-icon { font-size: 7rem; }
            .surprise-content h2 { font-size: 2rem; }
            .gallery-item { width: 120px; height: 120px; }
        }
    </style>
</head>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>

    <script>
        (function() {
            // floating stars
            const starContainer = document.getElementById('starContainer');
            function createStar() {
                const star = document.createElement('div');
                star.classList.add('star');
                star.innerHTML = '⭐';
                star.style.left = Math.random() * 100 + '%';
                star.style.fontSize = (15 + Math.random() * 30) + 'px';
                star.style.animationDuration = (6 + Math.random() * 8) + 's';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.opacity = 0.5 + Math.random() * 0.4;
                return star;
            }
            for (let i = 0; i < 25; i++) starContainer.appendChild(createStar());

            // keep stars replenished
            setInterval(() => {
                if (starContainer.children.length < 35) starContainer.appendChild(createStar());
                else { starContainer.removeChild(starContainer.firstChild); starContainer.appendChild(createStar()); }
            }, 3000);

            // reveal gift
            const gift = document.getElementById('giftTrigger');
            const surprise = document.getElementById('surpriseBox');
            const subtitle = document.querySelector('.subtitle');
            const hint = document.querySelector('.click-hint');
            let revealed = false;

            function revealGift() {
                if (revealed) return;
                revealed = true;
                gift.style.transition = 'opacity 0.3s'; gift.style.opacity = '0';
                subtitle.style.transition = 'opacity 0.3s'; subtitle.style.opacity = '0';
                hint.style.transition = 'opacity 0.3s'; hint.style.opacity = '0';
                setTimeout(() => {
                    gift.style.display = 'none'; subtitle.style.display = 'none'; hint.style.display = 'none';
                    surprise.classList.remove('hidden'); surprise.classList.add('fade-in');
                    // confetti
                    confetti({ particleCount: 120, spread: 80, origin: { y: 0.6 }, colors: ['#f9e0a0', '#c9e4ff', '#ffd1dc'] });
                    for (let i = 0; i < 8; i++) setTimeout(() => starContainer.appendChild(createStar()), i * 120);
                }, 300);
            }

            gift.addEventListener('click', revealGift);
            gift.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); revealGift(); } });

            // initial confetti (tiny)
            window.addEventListener('load', () => setTimeout(() => confetti({ particleCount: 30, spread: 45, origin: { y: 0.5 }, colors: ['#f9e0a0'] }), 600));

            // LIGHTBOX for gallery images
            const modal = document.getElementById('lightboxModal');
            const modalImg = document.getElementById('lightboxImg');
            const closeModal = document.querySelector('.lightbox-close');
            const galleryItems = document.querySelectorAll('.gallery-item');

            function openLightbox(imgSrc) {
                modalImg.src = imgSrc;
                modal.classList.add('active');
            }

            function closeLightbox() {
                modal.classList.remove('active');
                modalImg.src = '';
            }

            galleryItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    const img = item.querySelector('img');
                    if (img && img.src) {
                        openLightbox(img.src);
                    }
                });
            });

            closeModal.addEventListener('click', closeLightbox);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeLightbox();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) closeLightbox();
            });
        })();
    </script>
    <!-- 
        CUSTOMIZATION GUIDE:

        2. Add or remove gallery items as needed.
